<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <link rel="stylesheet" type="text/css" href="css/font.css">
    <style>
        .group {
            position: relative;
        }
        .group > i {
            position: absolute;
            left: 4px;
            top: 6px;
            color: black;
        }
        .group > input {
            /*左内边距*/
            padding-left: 20px;
            /*无边框*/
            border: none;
            /*选中后不显示边框*/
            outline: none;
            /*下边框为下划线*/
            border-bottom: 1px solid black;
        }
    </style>
</head>
<body>
    <div class="group">
        <i class="fa fa-user"></i>
        <input type="text">
    </div>
    <div class="group">
        <i class="fa fa-lock"></i>
        <input type="password">
    </div>
    <div>
        <input type="button" value="登录">
    </div>
</body>
</html>
