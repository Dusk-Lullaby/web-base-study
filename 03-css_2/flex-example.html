<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>example</title>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        header {
            height: 40px;
            background-color: black;
        }
        main {
            height: calc(100% - 40px);
            width: 100%;
            display: flex;
            flex-direction: row;
        }
        aside {
            width: 200px;
            background-color: red;
        }
        section {
            width: calc(100% - 200px);
            display: flex;
            flex-direction: column;
        }
        nav,
        footer {
            background-color: green;
            height: 40px;
        }
        article {
            height: calc(100% - 40px - 40px);
        }
    </style>
</head>
<body>
    <header>

    </header>
    <main>
        <aside>

        </aside>
        <section>
            <nav></nav>
            <article></article>
            <footer></footer>
        </section>
    </main>
</body>
</html>
