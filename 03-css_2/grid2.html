<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>grid</title>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        header {
            height: 40px;
            background-color: black;
        }
        main {
            display: grid;
            grid-template-columns: 200px calc(100% - 200px);
            height: calc(100% - 40px);
        }
        aside {
            background-color: blue;
        }
        section {
            display: grid;
            grid-template-rows: 40px calc(100% - 80px) 40px;
        }
        nav,
        footer {
            background-color: pink;
            height: 40px;
        }
    </style>

</head>
<body>
    <header>

    </header>
    <main>
        <aside>

        </aside>
        <section>
            <nav></nav>
            <article></article>
            <footer></footer>
        </section>
    </main>
</body>
</html>
