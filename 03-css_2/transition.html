<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>过渡效果</title>
    <style>
        #tran {
            width: 200px;
            height: 200px;
            background-color: red;
            /*宽度发生变化时就会触发过渡效果*/
            transition: width .5s ease 0s;
        }
        #tran:hover {
            width: 800px;
        }
    </style>
</head>
<body>
    <div id="tran">

    </div>
</body>
</html>
