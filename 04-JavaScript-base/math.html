    <script type="text/javascript">
        // 向上取整
        console.log(Math.ceil(0.225));
        // 向下取整
        console.log(Math.floor(0.9));
        // 返回与给定数值最近的整数
        console.log(Math.round(2.5));
        console.log(Math.round(2.4));
        console.log(Math.round(-2.4));
        // 随机数
        console.log(Math.random());
    </script>
</html>
