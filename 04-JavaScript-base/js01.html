<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JavaScript</title>
    <link rel="stylesheet" type="text/css" href="">
</head>
<body>
    <div id="a" onclick="alert('弹框')">a</div>
    <script type="text/javascript">
        // 可以写访问ID为a的元素，但不能访问ID为b的元素
    </script>
    <div id="b"></div>
</body>
<script type="text/javascript">
    // variable
    {   // 作用范围
        var number1 = 1;
        let number2 = 2;
    }
    // console表示控制台，log表示日志记录
    // console.log(number1);
    // 无法访问number2
    // console.log(number2);

    // 凡是双引号和单引号引起来的都是字符串
    let s1 = "字符串";
    let s2 = '也是字符串';
    // indexOf方法，带有2个参数
    // 第一个表示要查找的参数
    // 第二个表示从给定的位置开始查找，如果没有传递，默认为0
    // 如果未找到则返回-1
    let index = s1.indexOf("符", 2);
    console.log(index);

    let c = s1.charAt(0);   // 返回值是一个字符串
    console.log(c);
    // typeof 表示···的类型
    console.log(typeof c);

    // 左闭右开
    let sub = s1.substring(1, 3);
    console.log(sub);

    // 给定的字符串按照空白字符拆分
    let arr = s1.split("");
    console.log(arr);

    let newStr = s1.replace("字", "zi");
    console.log(newStr);
</script>
<script type="text/javascript" src="js/js01.js"></script>
</html>
