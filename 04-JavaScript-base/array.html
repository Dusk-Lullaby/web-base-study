<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>array</title>
</head>
<body>
    <script type="text/javascript">
        // 构建一个长度为10的数组
        let array1 = new Array(10);
        // 构建一个数组，数组中存储元素12345
        let array2 = new Array(1, 2, 3, 4, 5);
        // 在JavaScript中，中括号表示数组
        let array3 = [1,2,3,4,5];

        // 数组元素赋值与Java中相同
        array1[0] = 1;
        array1[1] = 2;
        console.log(array1);

        // 将字符串a添加到数组的末尾
        array1.push("a");
        console.log(array1);
        // 可以一次性将数组中添加多个元素
        array1.push(3,4,5,6,7);
        console.log(array1);

        // 从下标为2的元素开始，删除5个元素
        array1.splice(2, 5);
        console.log(array1);
        // 从下标为1的元素开始删除3个元素
        // 然后将字符串"a""b""c"，从删除位置依次插入
        array1.splice(1, 3, "a", "b", "c");
        console.log(array1);

        // 将array3中的元素追加到array1的末尾
        // 需要注意，追加动作在新数组中进行
        let concat = array1.concat(array3);
        console.log(array1);
        console.log(concat);

        // 将concat数组中的所有元素，使用%拼接
        let str = concat.join("%");
        console.log(str);

        // 创建一个对象
        let o = new Object();
        // 对象的属性可以直接设置
        o.name = "张三";
        o.age = 18;
        o.sex = "男";

        // 在JavaScript中，大括号表示对象
        let stu = {
            // 属性名和属性值，使用冒号分隔开
            // 多个属性使用逗号分隔
            name: "张三",
            age: 20,
            sex: '男'
        };
        console.log(o);
        console.log(stu);
    </script>
</body>
</html>
