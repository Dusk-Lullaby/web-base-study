<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>flow</title>
</head>
<body>

</body>
<script type="text/javascript">
    let a = 10;
    if (typeof a === "number") {
        console.log("变量a是一个整数");
    } else {
        console.log("变量a不是一个整数");
    }

    switch (a % 3) {
        case 1:
            console.log(1);
            break;
        case 2:
            console.log(2);
            break;
        default:
            console.log(0);
    }

    for (let i = 0; i < 10; i++) {
        console.log(i);
    }
    let num = 0;
    while (num++ < 10) {
        console.log(num);
    }
    do {
        console.log(num--);
    } while (num > 0);

    console.log("===================");
    let arr = [1,2,3,4,5];
    // 对于数组来说，使用for in 循环就是遍历数组的下标
    for (let index in arr) {
        console.log(index + "=>" + arr[index]);
    }
    console.log("====================");
    // 对于对象来说，使用for in 循环就是遍历对象的属性
    let stu = {
        name: "张三",
        age: 25,
        score: 60
    };
    for (let prop in stu) {
        console.log(prop + "=>" + stu[prop]);
    }
    // 对象的属性取值，除了使用 . 操作之外，还可以使用中括号来取值
    console.log(stu.name);
    console.log(stu["name"]);
</script>
</html>
