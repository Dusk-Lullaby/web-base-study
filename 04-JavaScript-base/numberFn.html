<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>number_function</title>
</head>
<body>

</body>
<script type="text/javascript">
    // 在JavaScript中，parseInt函数能够将以数字开头的任意字符串转化为整数
    let a = parseInt("12a3");
    console.log(a);
    // 在JavaScript中，parseFloat函数能够将以数字以及‘.’号开头的任意字符串转化为浮点数
    let b = parseFloat(".132a");
    console.log(b);
    // 是否不是数字
    let res = isNaN("abc");
    console.log(res);
</script>
</html>
