<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>interval</title>
</head>
<body>
    <div id="time1"></div>
    <div id="time2"></div>
</body>
<script type="text/javascript">
    // 周期函数
    setInterval(function () {
        // 创建日期对象,默认时间为系统当前时间
        let now = new Date();
        // 获取年份
        let year = now.getFullYear();
        // 获取月份,月份在0~11之间
        let month = now.getMonth() + 1;
        // 获取日期是当前月的第几天
        let date = now.getDate();
        // 获取小时数
        let hour = now.getHours();
        // 获取分钟数
        let minute = now.getMinutes();
        // 获取秒数
        let second = now.getSeconds();
        let time = year + "-" + zerofill(month, 2) + "-" + zerofill(date, 2) + " " + zerofill(hour, 2) + ":" + zerofill(minute, 2) + ":" + zerofill(second, 2);
        let div = document.getElementById("time1");
        div.textContent = time;
    }, 1000);

    let count = 0;
    function showTime() {
        // 创建日期对象,默认时间为系统当前时间
        let now = new Date();
        // 获取年份
        let year = now.getFullYear();
        // 获取月份,月份在0~11之间
        let month = now.getMonth() + 1;
        // 获取日期是当前月的第几天
        let date = now.getDate();
        // 获取小时数
        let hour = now.getHours();
        // 获取分钟数
        let minute = now.getMinutes();
        // 获取秒数
        let second = now.getSeconds();
        let time = year + "-" + zerofill(month, 2) + "-" + zerofill(date, 2) + " " + zerofill(hour, 2) + ":" + zerofill(minute, 2) + ":" + zerofill(second, 2);
        let div = document.getElementById("time2");
        div.textContent = time;
        count++;
        // count为10,周期函数停止
        // if (count === 10) {
        //     // 清理给定的周期函数
        //     clearInterval(t);
        // }
    }
    // 如果第一个参数传递的是一个字符串，该字符串必须是函数的调用
    // let t = setInterval(showTime, 1000);
    // setInterval("showTime()", 1000);

    // 在3秒后执行一次showTime函数
    let s = setTimeout(showTime, 3000);
    clearTimeout(s);

    function zerofill(num, targetLen) {
        let str = num + "";
        while (str.length < targetLen) {
            str = "0" + str;
        }
        return str;
    }


</script>
</html>
