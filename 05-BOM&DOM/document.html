<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>document</title>
</head>
<body>
    <div id="a">a</div>
    <div id="b" class="c">b</div>
    <div class="c">c</div>
    <div name="d">d</div>
</body>
<script type="text/javascript">
    // 得到单个元素
    let div = document.getElementById("a");
    console.log(div);
    // 内部文本内容
    // div.innerText = "讲内容改变为b";
    // 内部HTML内容
    // div.innerHTML = "<h1>内容支持标签<h1>";
    // 作用与innerText一样
    div.textContent = "<h1>文本内容<h1>";
    console.log("================");
    // 通过标签名获取元素
    let divArr = document.getElementsByTagName("div");
    console.log(divArr);
    console.log("================");
    // 通过类名获取元素
    let arr = document.getElementsByClassName("c");
    console.log(arr);
    console.log("================");
    let nameArr = document.getElementsByClassName("d");
    console.log(nameArr);
</script>
</html>
