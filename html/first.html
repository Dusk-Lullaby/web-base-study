<!--声明文档类型为HTML5-->
<!DOCTYPE html>
<!--html网页应该在html标签对之间完成-->
<html lang="en">
<!--头部信息-->
<head>
    <!--网页元数据 字符集为UTF-8 支持中文-->
    <meta charset="UTF-8">
    <!--网页的标题-->
    <title>凌晨一点的猫</title>
</head>
<!--HTML标签都可以理解为容器-->
<body>
<!--网页的主体部分-->
    <h1>凌</h1>
    <!--标签自闭和-->
    <hr />
    <h2>晨</h2>
    <h3>一</h3>
    <h4>点</h4>
    <h5>的</h5>
    <h6>猫</h6>

    <h1>凌晨一点的猫的梦想</h1>
    <hr />
    <p>
        我要成为猫中王！
    </p>

    <h1>热搜</h1>
    <!--Unordered List 无序列表-->
    <ul>
        <!--List Item 列表项-->
        <li>霸道猫猫爱上我</li>
        <li>总裁猫猫爱上我</li>
        <li>我爱上霸道猫猫</li>
        <li>我爱上总裁猫猫</li>
    </ul>
    <!--Ordered List 有序列表   type表示序号的类型，可以调整默认为1-->
    <ol type="i">
        <!--List Item 列表项-->
        <li>霸道猫猫爱上我</li>
        <li>总裁猫猫爱上我</li>
        <li>我爱上霸道猫猫</li>
        <li>我爱上总裁猫猫</li>
    </ol>
</body>
</html>
