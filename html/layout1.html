<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>lullaby</title>
    <style>
        html,body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        header {
            height: 40px;
            background-color: black;
            color: white;
        }
        main {
            height: calc(100% - 40px);
            display: grid;/*网格布局*/
            grid-template-columns: 200px calc(100% - 200px);
        }
        aside {
            background-color: red;
        }
        section {
            background-color: antiquewhite;
        }
        nav {
            height: 40px;
            background-color: aqua;
        }
        footer {
            height: 40px;
            background-color: black;
            color: white;
        }
        article {
            height: calc(100% - 80px);
        }
    </style>
</head>
<body>
    <header>
        页面页眉
    </header>
    <!--页面主体部分-->
    <main>
        <aside>
            侧边栏
        </aside>
        <!--页面内容区块-->
        <section>
            <nav>操作导航</nav>
            <article>操作导航</article>
            <footer>页面脚注</footer>
        </section>
    </main>
</body>
</html>
