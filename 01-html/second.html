<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>凌晨一点的猫</title>
</head>
<body>
    <!--表格的每一个元素都有边框-->
    <table border="1">
        <!--表格的标题-->
        <caption><h1>薪资表</h1></caption>
        <!--表头-->
        <thead>
            <!--table row-->
            <tr>
                <td>姓名</td>
                <td>薪资</td>
            </tr>
        </thead>
        <!--表格的主体部分-->
        <tbody>
            <tr>
                <td>张三</td>
                <td>20000</td>
            </tr>
            <tr>
                <td>李四</td>
                <td>15000</td>
            </tr>
        </tbody>
        <!--脚注：主要用于信息统计-->
        <tfoot>
            <tr>
                <td>平均薪资</td>
                <td>175000</td>
            </tr>
            <tr>
                <td>总薪资</td>
                <td>35000</td>
            </tr>
        </tfoot>
    </table>


    <!--不规则表格-->
    <table border="1">
        <caption><h1>成绩信息表</h1></caption>
        <thead>
        <tr>
            <!--rowspan 行的范围，2表示占2行，默认值是1-->
            <!--colspan 列的范围，1表示占1列，默认值是1-->
            <td rowspan="2" colspan="1">姓名</td>
            <td rowspan="1" colspan="5">成绩</td>
        </tr>
        <tr>
            <td rowspan="1" colspan="1">6月</td>
            <td rowspan="1" colspan="1">7月</td>
            <td rowspan="1" colspan="1">8月</td>
            <td rowspan="1" colspan="1">9月</td>
            <td rowspan="1" colspan="1">10月</td>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>张三</td>
            <td>60</td>
            <td>70</td>
            <td>80</td>
            <td>90</td>
            <td>65</td>
        </tr>
        </tbody>
    </table>
</body>

    这是没有边距的行
</div>

</div>

</div>
</html>
